server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /index.html {
    add_header Cache-Control "no-store";
    try_files /index.html =404;
  }

  location /src/ {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }

  location /public/ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "no-store";
    try_files $uri $uri/ /index.html;
  }
}
