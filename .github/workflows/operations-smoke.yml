name: Operations smoke

on:
  schedule:
    # 08:00 KST. Runs after backup, data refresh, and public smoke schedules.
    - cron: "0 23 * * *"
  workflow_dispatch:

concurrency:
  group: silver-operations-smoke
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: ${{ vars.SILVER_OPERATIONS_SMOKE_ENABLED != 'false' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate-deploy-config.sh

      - name: Prepare SSH config
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          if [ -z "$LIGHTSAIL_HOST" ]; then
            echo "LIGHTSAIL_HOST secret is required." >&2
            exit 1
          fi
          if [[ "$LIGHTSAIL_HOST" == *@* ]]; then
            echo "SSH_TARGET=$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
            echo "SSH_HOST=${LIGHTSAIL_HOST#*@}" >> "$GITHUB_ENV"
          else
            if [ -z "$LIGHTSAIL_USER" ]; then
              echo "LIGHTSAIL_USER secret is required when LIGHTSAIL_HOST has no user." >&2
              exit 1
            fi
            echo "SSH_TARGET=$LIGHTSAIL_USER@$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
            echo "SSH_HOST=$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
          fi

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run operations smoke on Lightsail
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/lightsail_key \
            "$SSH_TARGET" \
            "flock -w 900 /tmp/silver-lightsail-deploy.lock bash -lc 'cd ~/apps/silverProject/deploy && git pull --ff-only && chmod +x scripts/*.sh && ./scripts/smoke-after-deploy.sh'"
