name: Refresh public data

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Refresh mode: education, core, food, full"
        required: true
        default: "education"
      regions:
        description: "Comma-separated regions"
        required: true
        default: "강릉"
      limit:
        description: "Maximum records per source"
        required: true
        default: "20"
      mfds_pause_seconds:
        description: "Pause between MFDS calls when mode includes food"
        required: true
        default: "30"

concurrency:
  group: silver-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate-deploy-config.sh

      - name: Prepare SSH config
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          if [ -z "$LIGHTSAIL_HOST" ]; then
            echo "LIGHTSAIL_HOST secret is required." >&2
            exit 1
          fi
          if [[ "$LIGHTSAIL_HOST" == *@* ]]; then
            echo "SSH_TARGET=$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
            echo "SSH_HOST=${LIGHTSAIL_HOST#*@}" >> "$GITHUB_ENV"
          else
            if [ -z "$LIGHTSAIL_USER" ]; then
              echo "LIGHTSAIL_USER secret is required when LIGHTSAIL_HOST has no user." >&2
              exit 1
            fi
            echo "SSH_TARGET=$LIGHTSAIL_USER@$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
            echo "SSH_HOST=$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
          fi

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Validate refresh inputs
        env:
          SILVER_REFRESH_MODE: ${{ inputs.mode }}
          SILVER_REFRESH_REGIONS: ${{ inputs.regions }}
          SILVER_REFRESH_LIMIT: ${{ inputs.limit }}
          SILVER_MFDS_PAUSE_SECONDS: ${{ inputs.mfds_pause_seconds }}
        run: |
          set -euo pipefail

          case "$SILVER_REFRESH_MODE" in
            education|core|food|full)
              ;;
            *)
              echo "mode must be one of: education, core, food, full" >&2
              exit 1
              ;;
          esac

          if [ -z "${SILVER_REFRESH_REGIONS//[[:space:],]/}" ]; then
            echo "regions must include at least one region." >&2
            exit 1
          fi

          if [[ "$SILVER_REFRESH_REGIONS" == *$'\n'* || "$SILVER_REFRESH_REGIONS" == *$'\r'* ]]; then
            echo "regions must not include line breaks." >&2
            exit 1
          fi

          if ! [[ "$SILVER_REFRESH_LIMIT" =~ ^[1-9][0-9]*$ ]]; then
            echo "limit must be a positive integer." >&2
            exit 1
          fi

          if ! [[ "$SILVER_MFDS_PAUSE_SECONDS" =~ ^[0-9]+$ ]]; then
            echo "mfds_pause_seconds must be a non-negative integer." >&2
            exit 1
          fi

      - name: Refresh data on Lightsail
        env:
          SILVER_REFRESH_MODE: ${{ inputs.mode }}
          SILVER_REFRESH_REGIONS: ${{ inputs.regions }}
          SILVER_REFRESH_LIMIT: ${{ inputs.limit }}
          SILVER_MFDS_PAUSE_SECONDS: ${{ inputs.mfds_pause_seconds }}
        run: |
          set -euo pipefail

          quote() {
            printf "%q" "$1"
          }

          remote_mode="$(quote "$SILVER_REFRESH_MODE")"
          remote_regions="$(quote "$SILVER_REFRESH_REGIONS")"
          remote_limit="$(quote "$SILVER_REFRESH_LIMIT")"
          remote_mfds_pause="$(quote "$SILVER_MFDS_PAUSE_SECONDS")"

          ssh -i ~/.ssh/lightsail_key \
            "$SSH_TARGET" \
            "SILVER_REFRESH_MODE=$remote_mode SILVER_REFRESH_REGIONS=$remote_regions SILVER_REFRESH_LIMIT=$remote_limit SILVER_MFDS_PAUSE_SECONDS=$remote_mfds_pause bash -lc 'cd ~/apps/silverProject/deploy && git pull --ff-only && chmod +x scripts/*.sh && ./scripts/refresh-data.sh'"
