name: Deploy to Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_smoke:
        description: Run read-only public service and Memory smoke tests after deploy
        required: false
        type: boolean
        default: true

concurrency:
  group: silver-lightsail-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.LIGHTSAIL_DEPLOY_ENABLED != 'false' }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy config
        run: |
          chmod +x scripts/*.sh
          ./scripts/validate-deploy-config.sh

      - name: Prepare SSH config
        env:
          LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
          LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
        run: |
          set -euo pipefail
          if [ -z "$LIGHTSAIL_HOST" ]; then
            echo "LIGHTSAIL_HOST secret is required." >&2
            exit 1
          fi
          if [[ "$LIGHTSAIL_HOST" == *@* ]]; then
            echo "SSH_TARGET=$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
            echo "SSH_HOST=${LIGHTSAIL_HOST#*@}" >> "$GITHUB_ENV"
          else
            if [ -z "$LIGHTSAIL_USER" ]; then
              echo "LIGHTSAIL_USER secret is required when LIGHTSAIL_HOST has no user." >&2
              exit 1
            fi
            echo "SSH_TARGET=$LIGHTSAIL_USER@$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
            echo "SSH_HOST=$LIGHTSAIL_HOST" >> "$GITHUB_ENV"
          fi

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Lightsail
        env:
          RUN_SMOKE: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_smoke) || (github.event_name != 'workflow_dispatch' && vars.LIGHTSAIL_DEPLOY_SMOKE == 'true') }}
        run: |
          set -euo pipefail
          smoke_flag=0
          if [ "$RUN_SMOKE" = "true" ]; then
            smoke_flag=1
          fi

          ssh -i ~/.ssh/lightsail_key \
            "$SSH_TARGET" \
            "flock -w 900 /tmp/silver-lightsail-deploy.lock bash -lc 'cd ~/apps/silverProject/deploy && git pull --ff-only && chmod +x scripts/*.sh && SILVER_DEPLOY_SMOKE=${smoke_flag} ./scripts/deploy-app.sh'"
